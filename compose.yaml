services:
  database:
    image: mariadb:11.4
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-name-resolve
    environment:
      MARIADB_DATABASE: ${WORDPRESS_DB_NAME:-wordpress}
      MARIADB_USER: ${WORDPRESS_DB_USER:-wordpress}
      MARIADB_PASSWORD: ${WORDPRESS_DB_PASSWORD:-change-me}
      MARIADB_ROOT_PASSWORD: ${WORDPRESS_DB_ROOT_PASSWORD:-change-me}
    healthcheck:
      test:
        - CMD-SHELL
        - 'mariadb-admin ping -h 127.0.0.1 -u"$${MARIADB_USER}" -p"$${MARIADB_PASSWORD}" --silent'
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - internal

  wordpress:
    image: wordpress:7.0-php8.4-apache
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    ports:
      - "${WORDPRESS_PORT:-8080}:80"
    environment:
      WORDPRESS_DB_HOST: database:3306
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME:-wordpress}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER:-wordpress}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD:-change-me}
      WORDPRESS_TABLE_PREFIX: ${WORDPRESS_TABLE_PREFIX:-wp_}
      WORDPRESS_DEBUG: 1
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_ENVIRONMENT_TYPE', 'local');
        define('WP_DEBUG', true);
        define('WP_DEBUG_LOG', true);
        define('WP_DEBUG_DISPLAY', false);
        define('SCRIPT_DEBUG', true);
        define('DISALLOW_FILE_EDIT', true);
    healthcheck:
      test:
        - CMD-SHELL
        - 'php -r ''exit(@fsockopen("127.0.0.1", 80) ? 0 : 1);'''
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    volumes:
      - wordpress_core_data:/var/www/html
      - ./wordpress/wp-content:/var/www/html/wp-content
      - wordpress_uploads_data:/var/www/html/wp-content/uploads
      - ./docker/wordpress/php.ini:/usr/local/etc/php/conf.d/zz-local-php.ini:ro
      - ./docker/wordpress/uploads.ini:/usr/local/etc/php/conf.d/zz-local-uploads.ini:ro
    networks:
      - internal

  wp-cli:
    # The official CLI image is published as a PHP-specific variant without the 7.0 tag.
    image: wordpress:cli-php8.4
    user: "33:33"
    profiles:
      - tools
    depends_on:
      database:
        condition: service_healthy
      wordpress:
        condition: service_healthy
    working_dir: /var/www/html
    entrypoint:
      - wp
    environment:
      HOME: /tmp
      WP_CLI_CACHE_DIR: /tmp/.wp-cli/cache
      WORDPRESS_DB_HOST: database:3306
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME:-wordpress}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER:-wordpress}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD:-change-me}
      WORDPRESS_TABLE_PREFIX: ${WORDPRESS_TABLE_PREFIX:-wp_}
    volumes:
      - wordpress_core_data:/var/www/html
      - ./wordpress/wp-content:/var/www/html/wp-content
      - wordpress_uploads_data:/var/www/html/wp-content/uploads
      - ./docker/wordpress/php.ini:/usr/local/etc/php/conf.d/zz-local-php.ini:ro
      - ./docker/wordpress/uploads.ini:/usr/local/etc/php/conf.d/zz-local-uploads.ini:ro
    networks:
      - internal

  adminer:
    image: adminer:4.8.1
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    ports:
      - "${ADMINER_PORT:-8081}:8080"
    environment:
      ADMINER_DEFAULT_SERVER: database
    networks:
      - internal

  mailpit:
    image: axllent/mailpit:v1.27
    restart: unless-stopped
    ports:
      - "${MAILPIT_HTTP_PORT:-8025}:8025"
    networks:
      - internal

volumes:
  mariadb_data:
  wordpress_core_data:
  wordpress_uploads_data:

networks:
  internal:
    driver: bridge
